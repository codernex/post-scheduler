# Nginx configuration for Post-Scheduler
# Save this file to /etc/nginx/sites-available/post-scheduler and symlink to sites-enabled.
# After reloading Nginx, run Certbot to automatically configure SSL/HTTPS:
# sudo certbot --nginx -d post-scheduler.codernex.dev -d api-post-scheduler.codernex.dev

# 1. Next.js Frontend Proxy (post-scheduler.codernex.dev)
server {
    listen 80;
    listen [::]:80;
    server_name post-scheduler.codernex.dev;

    # Proxy to Next.js container (default port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. FastAPI Backend API Proxy (api-post-scheduler.codernex.dev)
server {
    listen 80;
    listen [::]:80;
    server_name api-post-scheduler.codernex.dev;

    client_max_body_size 50M;

    # Proxy to FastAPI container (bound to host port 8082)
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
